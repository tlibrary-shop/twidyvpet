<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Twidy Cozy Garden</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="ui-layer">
        <header class="top-hud">
            <div class="pill">LV. 1 | <div class="exp-bar"><div id="exp-fill" style="width: 20%;"></div></div></div>
            <div class="pill">🪙 50</div>
        </header>
        <nav class="floating-dock">
            <button class="dock-btn" onclick="pokeTwidy()">👋</button>
            <button class="dock-btn main-btn" onclick="openChat()">💬</button>
            <button class="dock-btn" onclick="feedTwidy()">🍖</button>
        </nav>
    </div>

    <div id="world">
        <div id="twidy-container">
            <div id="thought-bubble" class="hidden">...</div>
            
            <div id="twidy-sprite">
                <span class="image-fallback-text">Gambar Twidy Belum Ada</span>
            </div>
            
            <div class="shadow-ground"></div>
        </div>
    </div>

    <div id="chat-modal" class="hidden">
        <div class="chat-wrapper">
            <div class="chat-header">
                <h4>Twidy</h4>
                <button class="btn-close" onclick="closeChat()">×</button>
            </div>
            <div class="chat-logs" id="chat-logs"></div>
            <div class="chat-input-row">
                <input type="text" id="chat-input" placeholder="Tulis pesan..." onkeypress="if(event.key==='Enter') sendChat()">
                <button class="btn-send" onclick="sendChat()">➤</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
