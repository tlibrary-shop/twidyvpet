<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Twidy Cozy Garden</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="ui-layer">
        <header class="top-hud">
            <div class="pill">LV. <span id="val-level">1</span> | <div class="exp-bar"><div id="exp-fill"></div></div></div>
            <div class="pill">🪙 <span id="val-coin">50</span></div>
        </header>
        <nav class="floating-dock">
            <button class="dock-btn" onclick="triggerAction('feed')">🍖</button>
            <button class="dock-btn main-btn" onclick="openChat()">💬</button>
            <button class="dock-btn" onclick="triggerAction('play')">🎾</button>
        </nav>
    </div>

    <div id="world">
        <div id="sky-layer">
            <div id="celestial"></div>
            <div id="clouds"></div>
        </div>

        <div id="scenery">
            <div class="mountain layer-1"></div>
            <div class="mountain layer-2"></div>
        </div>

        <div id="ground">
            <div class="stone-path"></div>
            
            <div class="pond" id="zone-pond">
                <div class="water-ripple"></div>
            </div>
            
            <div class="garden-lamp" id="zone-lamp">
                <div class="pole"></div>
                <div class="glass-case">
                    <div class="bulb" id="lamp-bulb"></div>
                </div>
                <div class="light-glow" id="lamp-glow"></div>
            </div>

            <div class="flower-bed" id="zone-flowers">🌸 🌷 🌼</div>
            <div class="wooden-bench" id="zone-bench">
                <div class="seat"></div>
                <div class="leg-l"></div><div class="leg-r"></div>
            </div>
        </div>

        <div id="twidy-container" style="transform: translate(50vw, 60vh);">
            <div id="thought-bubble" class="hidden">...</div>
            
            <div id="twidy-sprite" class="sprite-idle" onclick="pokeTwidy()"></div>
            
            <div class="shadow-ground"></div>
        </div>

        <div id="particle-layer"></div>
    </div>

    <div id="chat-modal" class="hidden">
        <div class="chat-wrapper">
            <div class="chat-header">
                <h4>Twidy</h4>
                <button class="btn-close" onclick="closeChat()">×</button>
            </div>
            <div class="chat-logs" id="chat-logs"></div>
            <div class="chat-input-row">
                <input type="text" id="chat-input" placeholder="Tulis pesan..." onkeypress="if(event.key==='Enter') sendChat()">
                <button class="btn-send" onclick="sendChat()">➤</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
