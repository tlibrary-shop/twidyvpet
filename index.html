<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Twidy's Cozy Garden</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="ui-layer">
        <header class="top-hud">
            <div class="pill status-pill">
                <div class="status-header">
                    <span class="level">LV. <span id="val-level">1</span></span>
                    <span class="exp-text"><span id="val-exp">0</span> / <span id="val-max-exp">100</span> XP</span>
                </div>
                <div class="exp-bar"><div id="exp-fill" style="width: 0%;"></div></div>
            </div>
            <div class="pill coin-pill">🪙 <span id="val-coin">50</span></div>
        </header>

        <nav class="floating-dock">
            <button class="dock-btn tooltip" onclick="triggerAction('feed')" data-title="Makan">🍖</button>
            <button class="dock-btn tooltip" onclick="triggerAction('bath')" data-title="Mandi">🧼</button>
            <button class="dock-btn main-btn tooltip" onclick="openChat()" data-title="Ngobrol">💬</button>
            <button class="dock-btn tooltip" onclick="triggerAction('play')" data-title="Main">🎾</button>
            <button class="dock-btn tooltip" onclick="triggerAction('read')" data-title="Baca">📚</button>
        </nav>
    </div>

    <div id="world">
        <div id="sky-layer">
            <div id="celestial-body"></div>
        </div>

        <div id="bg-scenery">
            <div class="mountain m1"></div>
            <div class="mountain m2"></div>
        </div>

        <div id="garden-ground">
            <div class="stone-path"></div>
            
            <div class="zone pond" id="zone-pond"><div class="water-ripple"></div></div>
            <div class="zone flower-bed" id="zone-flowers"><span class="flower f1">🌸</span><span class="flower f2">🌷</span></div>
            <div class="zone bench" id="zone-bench"><div class="wood-plank"></div><div class="wood-leg left"></div><div class="wood-leg right"></div></div>
            <div class="garden-lamp"><div class="pole"></div><div class="glass-case"><div class="bulb"></div></div><div class="light-glow"></div></div>
        </div>

        <div id="twidy-container" style="transform: translate(50vw, 55vh);">
            <div id="thought-bubble" class="hidden">...</div>
            <div id="zzz-fx" class="hidden">Zzz...</div>
            
            <div id="twidy-sprite" class="sprite-idle" onclick="pokeTwidy()"></div>
            <div class="shadow-ground"></div>
        </div>

        <div id="particle-layer"></div>
    </div>

    <div id="chat-modal" class="hidden">
        <div class="chat-wrapper">
            <div class="chat-header">
                <h4>Twidy</h4>
                <button class="btn-close" onclick="closeChat()">×</button>
            </div>
            <div class="chat-logs" id="chat-logs"></div>
            <div class="chat-input-row">
                <input type="text" id="chat-input" placeholder="Tulis pesan..." onkeypress="if(event.key==='Enter') sendChat()">
                <button class="btn-send" onclick="sendChat()">➤</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
